<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>放松下</title>
  <style>
    :root {
      --bg: #f6f7fb;
      --card: #fff;
      --text: #172033;
      --muted: #667085;
      --primary: #ff6b35;
      --line: #e4e7ec;
      --shadow: 0 18px 50px rgba(16, 24, 40, 0.12);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: radial-gradient(circle at top left, rgba(255, 107, 53, 0.18), transparent 30rem), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
    }

    .shell {
      width: min(1040px, calc(100% - 32px));
      margin: 0 auto;
      padding: 40px 0 64px;
    }

    .hero {
      margin-bottom: 28px;
      padding: 34px;
      border-radius: 28px;
      background: #101828;
      color: #fff;
      box-shadow: var(--shadow);
    }

    .hero a {
      color: #ffd7c8;
      text-decoration: none;
    }

    h1 {
      margin: 18px 0 12px;
      font-size: clamp(34px, 6vw, 58px);
      letter-spacing: -0.04em;
    }

    p {
      margin-top: 0;
      line-height: 1.8;
    }

    .lead {
      max-width: 780px;
      color: rgba(255, 255, 255, 0.72);
      font-size: 18px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 20px;
    }

    .card {
      display: flex;
      flex-direction: column;
      min-height: 260px;
      padding: 28px;
      border: 1px solid var(--line);
      border-radius: 26px;
      background: var(--card);
      color: inherit;
      text-decoration: none;
      box-shadow: var(--shadow);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .card:hover {
      transform: translateY(-4px);
      box-shadow: 0 24px 60px rgba(16, 24, 40, 0.16);
    }

    .icon {
      display: grid;
      width: 54px;
      height: 54px;
      margin-bottom: 22px;
      place-items: center;
      border-radius: 18px;
      background: rgba(255, 107, 53, 0.12);
      color: var(--primary);
      font-size: 28px;
    }

    h2 {
      margin: 0 0 12px;
      font-size: 26px;
    }

    .card p {
      color: var(--muted);
    }

    .tagline {
      margin-top: auto;
      color: var(--primary);
      font-weight: 800;
    }

    @media (max-width: 980px) {
      .grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    @media (max-width: 720px) {
      .grid {
        grid-template-columns: 1fr;
      }

      .shell {
        width: min(100% - 20px, 1040px);
        padding-top: 20px;
      }
    }
  </style>
</head>
<body>
  <main class="shell">
    <section class="hero">
      <a href="/">← 返回首页</a>
      <h1>放松下</h1>
      <p class="lead">这里放一些轻量工具和小应用：可以玩一局 2048、下一盘五子棋，也可以把跑步打卡截图自动整理成 Excel。</p>
    </section>

    <section class="grid" aria-label="放松下模块列表">
      <a class="card" href="/2048/">
        <span class="icon">🎮</span>
        <h2>2048 小游戏</h2>
        <p>经典数字合成小游戏，适合休息时快速放松。</p>
        <span class="tagline">开始游戏 →</span>
      </a>

      <a class="card" href="/gomoku/">
        <span class="icon">⚫</span>
        <h2>五子棋对战</h2>
        <p>支持双人对战、人机对战、难度调整、对局复盘和新手教学，棋盘背景也可以切换。</p>
        <span class="tagline">开始对弈 →</span>
      </a>

      <a class="card" href="/running-ocr/">
        <span class="icon">🏃</span>
        <h2>跑步打卡 OCR</h2>
        <p>基于 OCR 自动解析 Keep 等运动 APP 跑步打卡截图，生成 12 个标准字段并支持 Excel 下载。</p>
        <span class="tagline">导入截图 →</span>
      </a>
    </section>
  </main>
</body>
</html>
