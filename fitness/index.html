<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>轻练健身房 · 中文训练计划</title>
  <meta name="description" content="中文健身动作库、跑步推荐、跑者力量、训练计划、收藏动作和跟练计时。">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="fitness-shell">
    <header class="hero-card">
      <nav class="crumbs" aria-label="面包屑">
        <a href="/">首页</a>
        <span>/</span>
        <strong>健身</strong>
      </nav>
      <div class="hero-grid">
        <section>
          <p class="eyebrow">Light Fitness Studio</p>
          <h1>轻练健身房</h1>
          <p class="lead">把动作库、跑步推荐、跑者力量和跟练计划装进一个轻量中文训练工具。今天练什么，打开就有答案。</p>
          <form id="heroSearchForm" class="hero-search" role="search">
            <span aria-hidden="true">⌕</span>
            <input id="heroSearchInput" type="search" placeholder="搜索：深蹲 / 跑步 / 哑铃 / 跑者力量" autocomplete="off">
            <button type="submit">去找</button>
          </form>
        </section>
        <aside class="hero-note">
          <span>今日训练原则</span>
          <strong>轻量开始，稳定坚持</strong>
          <p>训练建议仅作参考，不替代医疗建议。先保证动作质量，再考虑强度；疼痛、头晕或不适请立即停止。</p>
        </aside>
      </div>
    </header>

    <section id="statusBar" class="status-bar" aria-live="polite">正在加载中文动作库…</section>
    <section id="app" class="app-stage"></section>
  </main>

  <nav class="bottom-tabs" aria-label="健身页面导航">
    <a href="#home" data-tab="home">🏠<span>首页</span></a>
    <a href="#library" data-tab="library">📚<span>动作库</span></a>
    <a href="#running" data-tab="running">🏃<span>跑步</span></a>
    <a href="#strength" data-tab="strength">🦵<span>跑者力量</span></a>
    <a href="#plans" data-tab="plans">📋<span>计划</span></a>
    <a href="#gym" data-tab="gym">👤<span>我的</span></a>
  </nav>

  <div id="toast" class="toast" role="status" aria-live="polite"></div>
  <div id="detailModal" class="modal" aria-hidden="true"></div>

  <script src="app.js" defer></script>
</body>
</html>
